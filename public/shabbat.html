<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shabbat Shalom / Chag Sameach - Rejewvenate</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 1rem;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .main-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .holiday-icons {
            font-size: 2rem;
            margin: 0.5rem;
        }
        .icons-container {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-icon" id="main-icon">🕯️</div>
        <h1 id="greeting">Shabbat Shalom!</h1>
        <p id="message">We'll be back after Shabbat!</p>
        <p id="wish">May you have a peaceful and meaningful Shabbat.</p>
        <div class="icons-container" id="holiday-icons" style="display: none;"></div>
    </div>

    <script>
        // Holiday-specific configurations
        const holidayConfigs = {
            'Rosh Hashana': {
                mainIcon: '🍎',
                icons: ['🍯', '🍎', '🎺'],
                wish: 'May you have a sweet and happy new year.'
            },
            'Yom Kippur': {
                mainIcon: '🕊️',
                icons: ['🕊️', '📖', '🕯️'],
                wish: 'May you have an easy and meaningful fast.'
            },
            'Sukkot': {
                mainIcon: '🌿',
                icons: ['🌿', '🍋', '🎪'],
                wish: 'May you have a joyous Sukkot in your sukkah.'
            },
            'Shmini Atzeret': {
                mainIcon: '🌧️',
                icons: ['🌧️', '🕯️', '📖'],
                wish: 'May you have a meaningful Shmini Atzeret.'
            },
            'Simchat Torah': {
                mainIcon: '📜',
                icons: ['📜', '🎉', '🕺'],
                wish: 'May you have a joyous Simchat Torah celebration.'
            },
            'Pesach': {
                mainIcon: '🍷',
                icons: ['🍷', '🍞', '🥚'],
                wish: 'May you have a meaningful and joyous Pesach.'
            },
            'Shavuot': {
                mainIcon: '🥛',
                icons: ['🥛', '🍰', '📖'],
                wish: 'May you have a meaningful and joyous Shavuot.'
            }
        };

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const name = decodeURIComponent(urlParams.get('name') || '');

        // Update content based on type
        if (type === 'holiday' && name && holidayConfigs[name]) {
            const config = holidayConfigs[name];
            document.getElementById('main-icon').textContent = config.mainIcon;
            document.getElementById('greeting').textContent = 'Chag Sameach!';
            document.getElementById('message').textContent = `We'll be back after ${name}!`;
            document.getElementById('wish').textContent = config.wish;
            
            const iconsContainer = document.getElementById('holiday-icons');
            iconsContainer.style.display = 'block';
            config.icons.forEach(icon => {
                const span = document.createElement('span');
                span.className = 'holiday-icons';
                span.textContent = icon;
                iconsContainer.appendChild(span);
            });
        }
    </script>
</body>
</html>
