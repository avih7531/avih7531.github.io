<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shabbat Shalom / Chag Sameach - Rejewvenate</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 1rem;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .shabbat-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .holiday-icon {
            font-size: 2rem;
            margin: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shabbat-icon" id="main-icon">🕯️</div>
        <h1 id="greeting">Shabbat Shalom!</h1>
        <p id="message">Thank you for visiting our website. We'll be back after Shabbat!</p>
        <p id="wish">May you have a peaceful and meaningful Shabbat.</p>
        <div id="holiday-icons" style="display: none;">
            <span class="holiday-icon">🎉</span>
            <span class="holiday-icon">🍷</span>
            <span class="holiday-icon">🍞</span>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        const name = urlParams.get('name');

        // Update content based on type
        if (type === 'holiday') {
            document.getElementById('main-icon').textContent = '🎉';
            document.getElementById('greeting').textContent = 'Chag Sameach!';
            document.getElementById('message').textContent = `Thank you for visiting our website. We'll be back after ${name}!`;
            document.getElementById('wish').textContent = `May you have a meaningful and joyous ${name}.`;
            document.getElementById('holiday-icons').style.display = 'block';
        }
    </script>
</body>
</html>
