<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shabbat Shalom / Chag Sameach - Rejewvenate</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 1rem;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .shabbat-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .holiday-icons {
            font-size: 1.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="mainIcon" class="shabbat-icon">🕯️</div>
        <h1 id="greeting">Shabbat Shalom!</h1>
        <p id="message">We'll be back after Shabbat!</p>
        <p id="wishes">May you have a peaceful and meaningful Shabbat.</p>
        <div id="additionalIcons" class="holiday-icons"></div>
    </div>

    <script>
        // Holiday-specific content
        const HOLIDAY_CONTENT = {
            'Rosh Hashana': {
                icon: '🍎',
                greeting: 'Shanah Tovah!',
                wish: 'May you be inscribed and sealed for a good year.',
                additionalIcons: '🍯🍎🎺'
            },
            'Yom Kippur': {
                icon: '📖',
                greeting: 'G\'mar Chatimah Tovah!',
                wish: 'May you have a meaningful fast and be sealed in the Book of Life.',
                additionalIcons: '✡️📖🕊️'
            },
            'Sukkot': {
                icon: '🌿',
                greeting: 'Chag Sameach!',
                wish: 'May you have a joyous Sukkot holiday.',
                additionalIcons: '🌿🍋🎪'
            },
            'Shmini Atzeret': {
                icon: '🌧️',
                greeting: 'Chag Sameach!',
                wish: 'May the coming year be blessed with abundant rain and prosperity.',
                additionalIcons: '🌧️✡️🌱'
            },
            'Simchat Torah': {
                icon: '📜',
                greeting: 'Chag Sameach!',
                wish: 'May you rejoice in the Torah and find meaning in its teachings.',
                additionalIcons: '📜✡️💃'
            },
            'Pesach': {
                icon: '🍷',
                greeting: 'Chag Sameach!',
                wish: 'May you have a meaningful and joyous Pesach.',
                additionalIcons: '🍷🍞🥚'
            },
            'Shavuot': {
                icon: '🌸',
                greeting: 'Chag Sameach!',
                wish: 'May you receive the Torah with joy and understanding.',
                additionalIcons: '🌸📜🧀'
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            // Try to parse type and name from data passed by middleware
            // Fall back to URL parameters for backward compatibility
            let type = 'shabbat';
            let name = '';
            
            // Get URL parameters as fallback for client-side testing
            const urlParams = new URLSearchParams(window.location.search);
            const urlType = urlParams.get('type');
            const urlName = urlParams.get('name');
            
            if (urlType) type = urlType;
            if (urlName) name = urlName;
            
            // Update content based on type and name
            if (type === 'holiday' && name) {
                const holidayData = HOLIDAY_CONTENT[name] || {
                    icon: '🎉',
                    greeting: 'Chag Sameach!',
                    wish: 'May you have a joyous holiday.',
                    additionalIcons: '🎉✡️🕍'
                };
                
                // Update the page content for holiday
                document.getElementById('mainIcon').textContent = holidayData.icon;
                document.getElementById('greeting').textContent = holidayData.greeting;
                document.getElementById('message').textContent = `We'll be back after ${name}!`;
                document.getElementById('wishes').textContent = holidayData.wish;
                document.getElementById('additionalIcons').textContent = holidayData.additionalIcons;
                document.title = `${holidayData.greeting} - Rejewvenate`;
            } else {
                // Default Shabbat content
                document.getElementById('mainIcon').textContent = '🕯️';
                document.getElementById('greeting').textContent = 'Shabbat Shalom!';
                document.getElementById('message').textContent = "We'll be back after Shabbat!";
                document.getElementById('wishes').textContent = 'May you have a peaceful and meaningful Shabbat.';
                document.getElementById('additionalIcons').textContent = '';
                document.title = 'Shabbat Shalom - Rejewvenate';
            }
        });
    </script>
</body>
</html>
